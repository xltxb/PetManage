server:
  port: 8080
  mode: debug  # debug, release, test

# Supabase (PostgreSQL)
database:
  driver: postgres
  host: ${SUPABASE_DB_HOST:-localhost}
  port: 5432
  user: ${SUPABASE_DB_USER:-postgres}
  password: ${SUPABASE_DB_PASSWORD:-}
  dbname: ${SUPABASE_DB_NAME:-postgres}
  max_open_conns: 100
  max_idle_conns: 10

supabase:
  url: ${SUPABASE_URL:-}
  anon_key: ${SUPABASE_ANON_KEY:-}
  service_role_key: ${SUPABASE_SERVICE_ROLE_KEY:-}

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: ${JWT_SECRET:-change-me-in-production}
  access_token_ttl: 7200   # 2 hours
  refresh_token_ttl: 604800 # 7 days

log:
  level: debug  # debug, info, warn, error
  output: stdout  # stdout, file
  file_path: logs/app.log

encryption:
  current_key_version: "v1"
  keys:
    v1: ${ENCRYPTION_KEY_V1:-32lv7TPsDWcj+yupHIYQzHunVG7TY3sfnpOFMFrO/No=}
    v2: ${ENCRYPTION_KEY_V2:-zxrBzMjIOaUoqvtHtH8KAKTNo6Ko63uwEatAAWy5aqs=}
